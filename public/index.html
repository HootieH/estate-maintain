<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estate Maintain</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/onboarding.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="app">
    <div id="login-view"></div>
    <div id="main-view" style="display:none">
      <aside id="sidebar">
        <div class="sidebar-brand">
          <i data-lucide="home" class="brand-icon"></i>
          <span class="brand-text">Estate Maintain</span>
        </div>
        <nav class="sidebar-nav">
          <a href="#/dashboard" class="nav-item" data-route="dashboard">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
          </a>
          <a href="#/workorders" class="nav-item" data-route="workorders">
            <i data-lucide="clipboard-list"></i>
            <span>Work Orders</span>
          </a>
          <a href="#/requests" class="nav-item" data-route="requests">
            <i data-lucide="inbox"></i>
            <span>Work Requests</span>
            <span class="nav-badge" id="requests-pending-badge" style="display:none"></span>
          </a>
          <a href="#/properties" class="nav-item" data-route="properties">
            <i data-lucide="building-2"></i>
            <span>Properties</span>
          </a>
          <a href="#/assets" class="nav-item" data-route="assets">
            <i data-lucide="wrench"></i>
            <span>Assets</span>
          </a>
          <a href="#/preventive" class="nav-item" data-route="preventive">
            <i data-lucide="calendar-clock"></i>
            <span>Preventive Maintenance</span>
          </a>
          <a href="#/procedures" class="nav-item" data-route="procedures">
            <i data-lucide="clipboard-check"></i>
            <span>Procedures</span>
          </a>
          <a href="#/parts" class="nav-item" data-route="parts">
            <i data-lucide="package"></i>
            <span>Parts & Inventory</span>
          </a>
          <a href="#/vendors" class="nav-item" data-route="vendors">
            <i data-lucide="truck"></i>
            <span>Vendors</span>
          </a>
          <a href="#/purchaseorders" class="nav-item" data-route="purchaseorders">
            <i data-lucide="shopping-cart"></i>
            <span>Purchase Orders</span>
          </a>
          <a href="#/messages" class="nav-item" data-route="messages">
            <i data-lucide="message-circle"></i>
            <span>Messages</span>
            <span class="nav-badge" id="messages-unread-badge" style="display:none"></span>
          </a>
          <a href="#/teams" class="nav-item" data-route="teams">
            <i data-lucide="users"></i>
            <span>Teams</span>
          </a>
          <a href="#/reports" class="nav-item" data-route="reports">
            <i data-lucide="bar-chart-3"></i>
            <span>Reports</span>
          </a>
          <a href="#/settings" class="nav-item" data-route="settings">
            <i data-lucide="settings"></i>
            <span>Settings</span>
          </a>
        </nav>
        <div class="sidebar-user">
          <div class="user-avatar" id="sidebar-avatar"></div>
          <div class="user-info">
            <div class="user-name" id="sidebar-user-name"></div>
            <div class="user-email" id="sidebar-user-email"></div>
          </div>
          <button class="btn-icon" onclick="API.logout()" title="Logout">
            <i data-lucide="log-out"></i>
          </button>
        </div>
      </aside>
      <div id="content-wrapper">
        <header id="topbar">
          <button class="btn-icon mobile-menu-toggle" onclick="App.toggleSidebar()">
            <i data-lucide="menu"></i>
          </button>
          <div id="breadcrumb"></div>
          <div class="topbar-actions">
            <button class="btn-icon" onclick="Search.open()" title="Search (Ctrl+K)">
              <i data-lucide="search"></i>
            </button>
            <button class="theme-toggle" onclick="App.toggleTheme()" title="Toggle dark mode">
              <i data-lucide="moon"></i>
            </button>
            <div class="notification-bell-wrapper">
              <button class="btn-icon" id="notification-bell" onclick="Notifications.toggle()" title="Notifications">
                <i data-lucide="bell"></i>
                <span class="notification-badge" id="notification-badge" style="display:none">0</span>
              </button>
              <div class="notification-panel" id="notification-panel" style="display:none">
                <div class="notification-panel-header">
                  <h3>Notifications</h3>
                  <button class="btn btn-sm btn-secondary" onclick="Notifications.markAllRead()">Mark all read</button>
                </div>
                <div class="notification-panel-body" id="notification-list"></div>
              </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="Router.navigate('#/workorders/new')">
              <i data-lucide="plus"></i> New Work Order
            </button>
          </div>
        </header>
        <main id="main-content"></main>
      </div>
    </div>
  </div>
  <div id="onboarding-overlay" class="ob-overlay" style="display:none"></div>
  <div id="toast-container"></div>
  <div id="modal-overlay" class="modal-overlay" style="display:none" onclick="App.closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title"></h2>
        <button class="btn-icon" onclick="App.closeModal()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body"></div>
      <div class="modal-footer"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/pagination.js"></script>
  <script src="/js/components/login.js"></script>
  <script src="/js/components/dashboard.js"></script>
  <script src="/js/components/properties.js"></script>
  <script src="/js/components/workorders.js"></script>
  <script src="/js/components/assets.js"></script>
  <script src="/js/components/preventive.js"></script>
  <script src="/js/components/parts.js"></script>
  <script src="/js/components/teams.js"></script>
  <script src="/js/components/settings.js"></script>
  <script src="/js/components/procedures.js"></script>
  <script src="/js/components/reports.js"></script>
  <script src="/js/components/messages.js"></script>
  <script src="/js/components/requests.js"></script>
  <script src="/js/components/vendors.js"></script>
  <script src="/js/components/purchaseorders.js"></script>
  <script src="/js/components/tooltips.js"></script>
  <script src="/js/components/search.js"></script>
  <script src="/js/components/onboarding.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => Tooltips.init());</script>
</body>
</html>
